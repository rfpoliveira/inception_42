services:

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb/
    image: mariadb:inception
    restart: always
    volumes:
      - database:/var/lib/mysql/
    networks:
      - inception_network
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress/
    image: wordpress:inception
    restart: always
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_network
    env_file:
      - .env
    depends_on:
      - mariadb
    secrets: 
      - db_password
      - wp_admin_password
      - wp_user_password

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx/
      args:
        CERT_FOLDER: ${CERT_FOLDER}
        CERTIFICATE: ${CERTIFICATE}
        KEY: ${KEY}
        COUNTRY: ${COUNTRY}
        STATE: ${STATE}
        LOCALITY: ${LOCALITY}
        ORGANIZATION: ${ORGANIZATION}
        UNIT: ${UNIT}
        COMMON_NAME: ${COMMON_NAME}
    image: nginx:inception
    restart: always
    ports:
      - '443:443'
    volumes:
      - wordpress_files:/var/www/html
    networks:
      - inception_network
    env_file:
      - .env
    depends_on:
      - wordpress

volumes:

  database:
    name: database
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

  wordpress_files:
    name: wordpress_files
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress

networks:
  inception_network:
      name: inception_network
      driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_user_password:
    file: ./secrets/wp_user_password.txt